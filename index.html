<style>
:root{--cream:#fdf6ec;--gold:#e8a838;--coral:#e8604c;--blush:#f2c4b0;--deep:#2a1a0e;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--deep);min-height:100vh;overflow-x:hidden;}
.confetti-wrapper{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.confetti-piece{position:absolute;top:-20px;border-radius:2px;animation:fall linear infinite;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
#app{position:relative;z-index:1;}
.screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 22px 56px;animation:fadeIn .55s cubic-bezier(.22,1,.36,1) both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.1rem,9vw,3.3rem);line-height:1.1;text-align:center;color:var(--deep);margin-bottom:10px;}
h1 span{color:var(--coral);font-style:italic;}
h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:12px;color:var(--deep);}
p{font-size:.95rem;line-height:1.82;color:#5a3e2b;}
.badge{background:var(--coral);color:#fff;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:6px 18px;border-radius:100px;margin-bottom:18px;}
.divider{width:60px;height:3px;background:var(--blush);border-radius:10px;margin:14px auto;}
.icon-big{font-size:70px;margin-bottom:10px;}
.bouncing{animation:bounce 1.5s ease infinite;}
.wiggling{animation:wiggle 2s ease-in-out infinite;}
.pulsing{animation:pulse 1.8s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes wiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.card{background:#fff;border:1.5px solid var(--blush);border-radius:20px;padding:22px 24px;max-width:390px;width:100%;box-shadow:0 4px 24px rgba(232,96,76,.08);margin:14px 0;}
.highlight{font-family:'Playfair Display',serif;font-style:italic;color:var(--coral);font-size:1.05rem;}
.btn{background:var(--coral);color:#fff;border:none;border-radius:100px;padding:15px 38px;font-family:'DM Sans',sans-serif;font-size:.97rem;font-weight:500;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 18px rgba(232,96,76,.35);margin-top:10px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,96,76,.45);}
.btn:active{transform:scale(.96);}
.btn.gold{background:var(--gold);box-shadow:0 4px 18px rgba(232,168,56,.4);}
.btn.gold:hover{box-shadow:0 8px 24px rgba(232,168,56,.5);}
.btn.outline{background:transparent;color:var(--coral);border:2px solid var(--coral);box-shadow:none;}
.btn-row{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.alert-gold{background:#fff8e1;border-left:4px solid var(--gold);border-radius:10px;padding:14px 18px;max-width:390px;width:100%;margin:12px 0;font-size:.9rem;color:#5a4010;line-height:1.65;}
.li-wrapper{max-width:390px;width:100%;margin:14px 0;cursor:text;position:relative;}
.li-hidden{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;border:none;outline:none;}
.li-tap-hint{text-align:center;font-size:.8rem;color:#b09070;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:5px;}
.li-words{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:flex-end;}
.li-word{display:flex;gap:4px;align-items:center;}
.li-box{width:32px;height:40px;border-radius:8px;border:2px solid var(--blush);background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:var(--deep);text-transform:uppercase;transition:border-color .15s,background .15s,color .15s;flex-shrink:0;}
.li-box.li-active{border-color:var(--coral);background:#fff8f6;}
.li-box.li-filled{border-color:var(--coral);background:var(--coral);color:#fff;}
.li-box.li-hint{border-color:var(--gold);background:var(--gold);color:#fff;}
.li-box.li-shake{animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.li-gap{width:6px;}
.li-err{color:var(--coral);font-size:.84rem;text-align:center;margin-top:8px;display:none;}
.final-gradient{background:linear-gradient(135deg,var(--coral),var(--gold));color:#fff;border-radius:20px;padding:24px 26px;max-width:390px;width:100%;text-align:center;margin:14px 0;}
.final-gradient p{color:#fff;font-size:.97rem;}
.final-gradient strong{font-family:'Playfair Display',serif;font-size:1.15rem;}
.gift-link-box{background:#fff;border:1.5px solid var(--blush);border-radius:16px;padding:18px 20px;max-width:390px;width:100%;text-align:center;}
.gift-link-box a{color:var(--coral);font-weight:500;word-break:break-all;font-size:.95rem;}
</style>
</head>
<body>
<div class="confetti-wrapper" id="confetti"></div>
<div id="app"></div>
<script>
var LI = {answer:'', chars:[], locked:[], nextState:'', errId:''};

function liLockedHas(i) {
  return LI.locked.indexOf(i) !== -1;
}

function letterInput(answer, nextState, errId, showHints) {
  var upper = answer.toUpperCase();
  var flat = upper.replace(/ /g, '');
  var n = flat.length;
  var chars = [];
  var locked = [];
  var i;
  for (i = 0; i < n; i++) { chars.push(''); }
  if (showHints && n > 3) {
    locked.push(0); chars[0] = flat[0];
    locked.push(n - 1); chars[n - 1] = flat[n - 1];
  }
  LI.answer = upper;
  LI.chars = chars;
  LI.locked = locked;
  LI.nextState = nextState;
  LI.errId = errId;
  var words = upper.split(' ');
  var flatIdx = 0;
  var cursor = -1;
  for (i = 0; i < chars.length; i++) {
    if (!liLockedHas(i) && chars[i] === '') { cursor = i; break; }
  }
  var boxHtml = '<div class="li-words">';
  for (var wi = 0; wi < words.length; wi++) {
    boxHtml += '<div class="li-word">';
    for (var ci = 0; ci < words[wi].length; ci++) {
      var ch = chars[flatIdx];
      var cls = liLockedHas(flatIdx) ? 'li-hint' : (ch ? 'li-filled' : (flatIdx === cursor ? 'li-active' : ''));
      boxHtml += '<div class="li-box ' + cls + '">' + ch + '</div>';
      flatIdx += 1;
    }
    boxHtml += '</div>';
    if (wi < words.length - 1) { boxHtml += '<div class="li-gap"></div>'; }
  }
  boxHtml += '</div>';
  return '<div class="li-wrapper" onclick="focusLI()">' +
    '<input id="li-hidden" class="li-hidden" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" onkeydown="liHandleKey(event)">' +
    '<div class="li-tap-hint">Tocca qui per digitare</div>' +
    '<div id="li-display">' + boxHtml + '</div>' +
    '<p class="li-err" id="' + errId + '">Non e\' corretto, riprova!</p>' +
    '</div>' +
    '<button class="btn" onclick="liConfirm()">Conferma</button>';
}

function focusLI() {
  var h = document.getElementById('li-hidden');
  if (h) { h.focus(); }
}

function liCursor() {
  for (var i = 0; i < LI.chars.length; i++) {
    if (!liLockedHas(i) && LI.chars[i] === '') { return i; }
  }
  return -1;
}

function liHandleKey(e) {
  var err = document.getElementById(LI.errId);
  if (e.key === 'Backspace') {
    for (var i = LI.chars.length - 1; i >= 0; i -= 1) {
      if (!liLockedHas(i) && LI.chars[i] !== '') {
        LI.chars[i] = '';
        if (err) { err.style.display = 'none'; }
        liRender();
        return;
      }
    }
    return;
  }
  if (e.key === 'Enter') { liConfirm(); return; }
  var re = /^[a-zA-Z0-9]$/;
  if (!re.test(e.key)) { return; }
  var cursor = liCursor();
  if (cursor === -1) { return; }
  LI.chars[cursor] = e.key.toUpperCase();
  if (err) { err.style.display = 'none'; }
  liRender();
}

function liRender() {
  var display = document.getElementById('li-display');
  if (!display) { return; }
  var words = LI.answer.split(' ');
  var cursor = liCursor();
  var flatIdx = 0;
  var html = '<div class="li-words">';
  for (var wi = 0; wi < words.length; wi++) {
    html += '<div class="li-word">';
    for (var ci = 0; ci < words[wi].length; ci++) {
      var ch = LI.chars[flatIdx];
      var cls = liLockedHas(flatIdx) ? 'li-hint' : (ch ? 'li-filled' : (flatIdx === cursor ? 'li-active' : ''));
      html += '<div class="li-box ' + cls + '">' + ch + '</div>';
      flatIdx += 1;
    }
    html += '</div>';
    if (wi < words.length - 1) { html += '<div class="li-gap"></div>'; }
  }
  html += '</div>';
  display.innerHTML = html;
}

function liConfirm() {
  var empty = false;
  for (var i = 0; i < LI.chars.length; i++) {
    if (LI.chars[i] === '') { empty = true; break; }
  }
  if (empty) { shakeLI(); return; }
  var typed = LI.chars.join('').toLowerCase();
  var answer = LI.answer.replace(/ /g, '').toLowerCase();
  if (typed === answer) {
    go(LI.nextState);
  } else {
    shakeLI();
    var err = document.getElementById(LI.errId);
    if (err) { err.style.display = 'block'; }
  }
}

function shakeLI() {
  var display = document.getElementById('li-display');
  if (!display) { return; }
  var boxes = display.querySelectorAll('.li-box');
  for (var i = 0; i < boxes.length; i++) {
    boxes[i].classList.remove('li-shake');
    void boxes[i].offsetWidth;
    boxes[i].classList.add('li-shake');
  }
}

function go(state) {
  var screens = {
    welcome: screenWelcome,
    riddle1: screenRiddle1,
    riddle1_ok: screenRiddle1Ok,
    riddle1_wait: screenRiddle1Wait,
    riddle2: screenRiddle2,
    riddle2_ok: screenRiddle2Ok,
    riddle2_question: screenRiddle2Question,
    riddle2_no: screenRiddle2No,
    ppt_riddle: screenPptRiddle,
    ppt_ok: screenPptOk,
    wait1: screenWait1,
    apollo_riddle: screenApolloRiddle,
    apollo_ok: screenApolloOk,
    castello_riddle: screenCastelloRiddle,
    castello_ok: screenCastelloOk,
    cc_ok: screenCcOk,
    zara_riddle: screenZaraRiddle,
    zara_ok: screenZaraOk,
    wait2: screenWait2,
    borra_riddle: screenBorraRiddle,
    final: screenFinal
  };
  var fn = screens[state];
  document.getElementById('app').innerHTML = fn ? fn() : '';
  window.scrollTo(0, 0);
  if (state === 'welcome' || state === 'final' || state === 'ppt_ok') { spawnConfetti(); }
  setTimeout(focusLI, 120);
}

function spawnConfetti() {
  var w = document.getElementById('confetti');
  w.innerHTML = '';
  var C = ['#e8604c','#e8a838','#f2c4b0','#f7a8b0','#ffd166','#a8dadc','#b8f0a0'];
  for (var i = 0; i < 60; i++) {
    var el = document.createElement('div');
    el.className = 'confetti-piece';
    var s = 7 + Math.random() * 9;
    var color = C[Math.floor(Math.random() * C.length)];
    var radius = Math.random() > 0.5 ? '50%' : '3px';
    var dur = (3 + Math.random() * 5) + 's';
    var delay = (Math.random() * 3) + 's';
    var op = (0.6 + Math.random() * 0.4);
    el.style.cssText = 'left:' + (Math.random()*100) + 'vw;background:' + color + ';width:' + s + 'px;height:' + s + 'px;border-radius:' + radius + ';animation-duration:' + dur + ';animation-delay:' + delay + ';opacity:' + op + ';';
    w.appendChild(el);
  }
}
