:root{--cream:#fdf6ec;--gold:#e8a838;--coral:#e8604c;--blush:#f2c4b0;--deep:#2a1a0e;}

body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--deep);min-height:100vh;overflow-x:hidden;}

@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
#app{position:relative;z-index:1;}
.screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 22px 56px;animation:fadeIn .55s cubic-bezier(.22,1,.36,1) both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.1rem,9vw,3.3rem);line-height:1.1;text-align:center;color:var(--deep);margin-bottom:10px;}

p{font-size:.95rem;line-height:1.82;color:#5a3e2b;}

.divider{width:60px;height:3px;background:var(--blush);border-radius:10px;margin:14px auto;}
.icon-big{font-size:70px;margin-bottom:10px;}
.bouncing{animation:bounce 1.5s ease infinite;}
.wiggling{animation:wiggle 2s ease-in-out infinite;}
.pulsing{animation:pulse 1.8s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes wiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.card{background:#fff;border:1.5px solid var(--blush);border-radius:20px;padding:22px 24px;max-width:390px;width:100%;box-shadow:0 4px 24px rgba(232,96,76,.08);margin:14px 0;}
.highlight{font-family:'Playfair Display',serif;font-style:italic;color:var(--coral);font-size:1.05rem;}
.btn{background:var(--coral);color:#fff;border:none;border-radius:100px;padding:15px 38px;font-family:'DM Sans',sans-serif;font-size:.97rem;font-weight:500;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 18px rgba(232,96,76,.35);margin-top:10px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,96,76,.45);}
.btn:active{transform:scale(.96);}
.btn.gold{background:var(--gold);box-shadow:0 4px 18px rgba(232,168,56,.4);}
.btn.gold:hover{box-shadow:0 8px 24px rgba(232,168,56,.5);}
.btn.outline{background:transparent;color:var(--coral);border:2px solid var(--coral);box-shadow:none;}
.btn-row{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.alert-gold{background:#fff8e1;border-left:4px solid var(--gold);border-radius:10px;padding:14px 18px;max-width:390px;width:100%;margin:12px 0;font-size:.9rem;color:#5a4010;line-height:1.65;}
.li-wrapper{max-width:390px;width:100%;margin:14px 0;cursor:text;position:relative;}
.li-hidden{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;border:none;outline:none;}
.li-tap-hint{text-align:center;font-size:.8rem;color:#b09070;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:5px;}
.li-words{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:flex-end;}
.li-word{display:flex;gap:4px;align-items:center;}
.li-box{width:32px;height:40px;border-radius:8px;border:2px solid var(--blush);background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:var(--deep);text-transform:uppercase;transition:border-color .15s,background .15s,color .15s;flex-shrink:0;}
.li-box.li-active{border-color:var(--coral);background:#fff8f6;}
.li-box.li-filled{border-color:var(--coral);background:var(--coral);color:#fff;}

.gift-link-box a{color:var(--coral);font-weight:500;word-break:break-all;font-size:.95rem;}
</style>

<body>
<div class="confetti-wrapper" id="confetti"></div>
<div id="app"></div>
<script>
const LI={answer:'',chars:[],locked:new Set(),nextState:'',errId:''};

function letterInput(answer,nextState,errId,showHints){
const upper=answer.toUpperCase();
const flat=upper.replace(/ /g,’’);
const n=flat.length;
const chars=Array(n).fill(’’);
const locked=new Set();
if(showHints&&n>3){locked.add(0);chars[0]=flat[0];locked.add(n-1);chars[n-1]=flat[n-1];}
LI.answer=upper;LI.chars=chars;LI.locked=locked;LI.nextState=nextState;LI.errId=errId;
const words=upper.split(’ ‘);
let flatIdx=0;
const cursor=chars.findIndex((c,i)=>!locked.has(i)&&c===’’);
let boxHtml=’<div class="li-words">’;
for(let wi=0;wi<words.length;wi++){
boxHtml+=’<div class="li-word">’;
for(let ci=0;ci<words[wi].length;ci++){
const ch=chars[flatIdx];
const cls=locked.has(flatIdx)?‘li-hint’:ch?‘li-filled’:flatIdx===cursor?‘li-active’:’’;
boxHtml+=`<div class="li-box ${cls}">${ch}</div>`;
flatIdx++;
}
boxHtml+=’</div>’;
if(wi<words.length-1)boxHtml+=’<div class="li-gap"></div>’;
}
boxHtml+=’</div>’;
return `<div class="li-wrapper" onclick="focusLI()">
<input id="li-hidden" class="li-hidden" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" onkeydown="liHandleKey(event)">

  <div class="li-tap-hint">⌨️ Tocca qui per digitare</div>
  <div id="li-display">${boxHtml}</div>
  <p class="li-err" id="${errId}">Non è corretto, riprova! 🙅</p>
</div>
<button class="btn" onclick="liConfirm()">Conferma ✓</button>`;}

function focusLI(){const h=document.getElementById(‘li-hidden’);if(h)h.focus();}

function liCursor(){for(let i=0;i<LI.chars.length;i++){if(!LI.locked.has(i)&&LI.chars[i]===’’)return i;}return -1;}

function liHandleKey(e){
const err=document.getElementById(LI.errId);
if(e.key===‘Backspace’){
for(let i=LI.chars.length-1;i>=0;i–-){
if(!LI.locked.has(i)&&LI.chars[i]!==’’){LI.chars[i]=’’;if(err)err.style.display=‘none’;liRender();return;}
}return;
}
if(e.key===‘Enter’){liConfirm();return;}
if(!/^[a-zA-Z0-9]$/.test(e.key))return;
const cursor=liCursor();if(cursor===-1)return;
LI.chars[cursor]=e.key.toUpperCase();if(err)err.style.display=‘none’;liRender();
}

function liRender(){
const display=document.getElementById(‘li-display’);if(!display)return;
const words=LI.answer.split(’ ‘);
const cursor=liCursor();
let flatIdx=0;
let html=’<div class="li-words">’;
for(let wi=0;wi<words.length;wi++){
html+=’<div class="li-word">’;
for(let ci=0;ci<words[wi].length;ci++){
const ch=LI.chars[flatIdx];
const cls=LI.locked.has(flatIdx)?‘li-hint’:ch?‘li-filled’:flatIdx===cursor?‘li-active’:’’;
html+=`<div class="li-box ${cls}">${ch}</div>`;
flatIdx++;
}
html+=’</div>’;
if(wi<words.length-1)html+=’<div class="li-gap"></div>’;
}
html+=’</div>’;
display.innerHTML=html;
}

function liConfirm(){
if(LI.chars.some(c=>c===’’)){shakeLI();return;}
const typed=LI.chars.join(’’).toLowerCase();
const answer=LI.answer.replace(/ /g,’’).toLowerCase();
if(typed===answer){go(LI.nextState);}
else{shakeLI();const err=document.getElementById(LI.errId);if(err)err.style.display=‘block’;}
}

function shakeLI(){
const display=document.getElementById(‘li-display’);if(!display)return;
display.querySelectorAll(’.li-box’).forEach(b=>{b.classList.remove(‘li-shake’);void b.offsetWidth;b.classList.add(‘li-shake’);});
}

function go(state){
const STATES={
welcome:screenWelcome,riddle1:screenRiddle1,riddle1_ok:screenRiddle1Ok,
riddle1_wait:screenRiddle1Wait,riddle2:screenRiddle2,riddle2_ok:screenRiddle2Ok,
riddle2_question:screenRiddle2Question,riddle2_no:screenRiddle2No,
ppt_riddle:screenPptRiddle,ppt_ok:screenPptOk,wait1:screenWait1,
apollo_riddle:screenApolloRiddle,apollo_ok:screenApolloOk,
castello_riddle:screenCastelloRiddle,castello_ok:screenCastelloOk,
cc_ok:screenCcOk,zara_riddle:screenZaraRiddle,zara_ok:screenZaraOk,
wait2:screenWait2,borra_riddle:screenBorraRiddle,final:screenFinal
};
document.getElementById(‘app’).innerHTML=STATES[state]?STATES[state]():’’;
window.scrollTo({top:0,behavior:‘smooth’});
if([‘welcome’,‘final’,‘ppt_ok’].includes(state))spawnConfetti();
setTimeout(()=>focusLI(),120);
}
